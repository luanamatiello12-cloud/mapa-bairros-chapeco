<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Mapa - Meninas de Chapecó</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; }

    h1 {
      text-align: center;
      padding: 14px 12px 10px;
      font-size: 18px;
      font-weight: 600;
      color: #222;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    #map {
      width: 100%;
      height: 52vh;
    }

    #painel {
      background: white;
      border-top: 1px solid #e0e0e0;
      padding: 10px 12px;
    }

    #lista {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 28vh;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .item-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item-info { flex: 1; }
    .item-nome { font-weight: 600; color: #222; }
    .item-bairro { color: #777; font-size: 11px; }

    .btn-remover {
      background: #fee2e2;
      border: none;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 18px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .btn-remover:hover { background: #fca5a5; }

    #form-add {
      display: flex;
      flex-direction: column;
      gap: 7px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    #form-add input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      width: 100%;
      outline: none;
    }

    #form-add input:focus { border-color: #7F77DD; }

    .row { display: flex; gap: 7px; }

    #cor-input {
      width: 44px !important;
      height: 38px;
      padding: 2px 3px !important;
      cursor: pointer;
      flex-shrink: 0;
    }

    #btn-add {
      flex: 1;
      background: #7F77DD;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #btn-add:hover { background: #534AB7; }

    #instrucao {
      font-size: 11px;
      color: #999;
      text-align: center;
      padding-top: 2px;
    }

    #status {
      font-size: 11px;
      color: #999;
      text-align: center;
      padding-bottom: 4px;
    }

    .marker-label {
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border: 2px solid white;
      font-family: sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📍 Meninas de Chapecó</h1>
<div id="map"></div>

<div id="painel">
  <div id="status">Carregando dados...</div>
  <div id="lista"></div>

  <div id="form-add">
    <input id="inp-nome" type="text" placeholder="Nome (ex: Ana)" />
    <input id="inp-bairro" type="text" placeholder="Bairro (ex: Centro)" />
    <p id="instrucao">📌 Clique no mapa para escolher a localização</p>
    <div class="row">
      <input id="cor-input" type="color" value="#7F77DD" title="Escolha a cor" />
      <button id="btn-add" onclick="adicionarMenina()">+ Adicionar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBAM2d9CroacEwr808ZcEELoVhH-jQpwl4",
  authDomain: "mapa-meninas-chapeco.firebaseapp.com",
  databaseURL: "https://mapa-meninas-chapeco-default-rtdb.firebaseio.com",
  projectId: "mapa-meninas-chapeco",
  storageBucket: "mapa-meninas-chapeco.firebasestorage.app",
  messagingSenderId: "657001382612",
  appId: "1:657001382612:web:89178b7b443ec0e8307141"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('meninas');

const meninasIniciais = {
  tayna:            { nome: "Tayna",            bairro: "Passo dos Fortes",          lat: -27.1060, lng: -52.5980, cor: "#7F77DD" },
  marta:            { nome: "Marta",            bairro: "Efapi (perto do presídio)", lat: -27.0930, lng: -52.6210, cor: "#D85A30" },
  manu:             { nome: "Manu",             bairro: "Efapi (perto das Araras)",  lat: -27.0930, lng: -52.6210, cor: "#1D9E75" },
  cecilia:          { nome: "Cecília",          bairro: "Presidente Médici",         lat: -27.1150, lng: -52.6200, cor: "#D4537E" },
  leticiabegnini:   { nome: "Letícia Begnini",  bairro: "Jardim América",            lat: -27.1050, lng: -52.6300, cor: "#BA7517" },
  thaemi:           { nome: "Thaemi",           bairro: "São Cristóvão",             lat: -27.0980, lng: -52.6350, cor: "#378ADD" },
  leticiavanzella:  { nome: "Letícia Vanzella", bairro: "Centro",                    lat: -27.1005, lng: -52.6152, cor: "#639922" },
  luanamatiello:    { nome: "Luana Matiello",   bairro: "São Pedro",                 lat: -27.1080, lng: -52.6120, cor: "#E24B4A" },
  isadorareichert:  { nome: "Isadora Reichert", bairro: "Bela Vista",                lat: -27.1100, lng: -52.6250, cor: "#533AB7" }
};

let meninas = {};
let latSelecionada = null;
let lngSelecionada = null;
let markerTemp = null;
let marcadores = [];

const map = L.map('map').setView([-27.085, -52.628], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
}).addTo(map);

map.on('click', function(e) {
  latSelecionada = e.latlng.lat;
  lngSelecionada = e.latlng.lng;
  if (markerTemp) map.removeLayer(markerTemp);
  markerTemp = L.circleMarker([latSelecionada, lngSelecionada], {
    radius: 8, color: '#7F77DD', fillColor: '#7F77DD', fillOpacity: 0.7
  }).addTo(map);
  document.getElementById('instrucao').textContent = '✅ Local marcado! Preencha o nome e bairro.';
  document.getElementById('instrucao').style.color = '#1D9E75';
});

function gerarId(texto) {
  return texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '') + Date.now();
}

function salvarNoBanco() {
  console.log('SALVANDO NO BANCO:', JSON.parse(JSON.stringify(meninas)));
  db.set(meninas)
    .then(() => console.log('SALVO COM SUCESSO'))
    .catch(err => { console.error('ERRO AO SALVAR:', err); alert('Erro ao salvar: ' + err.message); });
}

function renderTudo() {
  marcadores.forEach(m => map.removeLayer(m));
  marcadores = [];
  document.getElementById('lista').innerHTML = '';

  Object.entries(meninas).forEach(([id, m]) => {
    if (!m) return;
    const icon = L.divIcon({
      html: `<div class="marker-label" style="background:${m.cor}">${m.nome}</div>`,
      className: '', iconAnchor: [0, 0]
    });
    const mk = L.marker([m.lat, m.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${m.nome}</b><br>${m.bairro}`);
    marcadores.push(mk);

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <span class="item-dot" style="background:${m.cor}"></span>
      <div class="item-info">
        <div class="item-nome">${m.nome}</div>
        <div class="item-bairro">${m.bairro}</div>
      </div>
      <button class="btn-remover" onclick="remover('${id}')" title="Remover">×</button>
    `;
    document.getElementById('lista').appendChild(div);
  });
}

function remover(id) {
  const nome = meninas[id]?.nome || 'esta pessoa';
  if (!confirm(`Remover ${nome}?`)) return;
  console.log('REMOVENDO ID:', id);
  delete meninas[id];
  console.log('ESTADO APOS REMOVER:', JSON.parse(JSON.stringify(meninas)));
  salvarNoBanco();
}

function adicionarMenina() {
  const nome = document.getElementById('inp-nome').value.trim();
  const bairro = document.getElementById('inp-bairro').value.trim();
  const cor = document.getElementById('cor-input').value;

  if (!nome) { alert('Digite o nome!'); return; }
  if (!bairro) { alert('Digite o bairro!'); return; }
  if (!latSelecionada) { alert('Clique no mapa para marcar a localização!'); return; }

  const id = gerarId(nome);
  meninas[id] = { nome, bairro, lat: latSelecionada, lng: lngSelecionada, cor };
  salvarNoBanco();

  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-bairro').value = '';
  latSelecionada = null; lngSelecionada = null;
  if (markerTemp) { map.removeLayer(markerTemp); markerTemp = null; }
  document.getElementById('instrucao').textContent = '📌 Clique no mapa para escolher a localização';
  document.getElementById('instrucao').style.color = '#999';
}

// Carrega dados do Firebase em tempo real
db.on('value', snapshot => {
  const dados = snapshot.val();
  console.log('DADOS RECEBIDOS DO FIREBASE:', dados);
  if (dados && typeof dados === 'object') {
    meninas = dados;
  } else {
    console.log('BANCO VAZIO - CARREGANDO INICIAIS');
    meninas = { ...meninasIniciais };
    salvarNoBanco();
  }
  document.getElementById('status').textContent = 'Sincronizado ✅';
  renderTudo();
}, erro => {
  document.getElementById('status').textContent = 'Erro ao carregar dados ❌';
  console.error(erro);
});
</script>
</body>
</html>
